<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DEMONIC PAINT</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.dom.min.js"></script>

  <style>
    /* Uygulama Estetiği ve Yerleşim CSS */
    html, body {
      margin: 0;
      padding: 0;
      background: #050505;
      overflow: hidden; /* Kaydırma çubuklarını gizler */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-touch-callout: none; /* iPad'de basılı tutunca menü açılmasını engeller */
      -webkit-user-select: none;
      user-select: none;
    }

    /* p5.js Canvas Yerleşimi */
    canvas {
      display: block;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Dosya yükleme butonunu gizlemek için ek CSS (v9.8'den beri kullandığımız yöntem) */
    input[type="file"] {
      opacity: 0;
      z-index: 2;
    }
  </style>
</head>

</body>
</html>
